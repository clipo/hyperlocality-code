# Tooling config for the reproduction repo. `ruff check src/` passes clean under
# these settings.
#
# The numeric routines deliberately use a compact idiom for readability: paired
# assignments on one physical line separated by ';' (e.g. `x = ...; y = ...`), and a
# few small local lambdas. E702 and E731 are ignored for that reason. Every
# correctness-relevant check stays on: the full pyflakes set (F-codes: undefined
# names, unused imports and variables) and the remaining pycodestyle E/W rules,
# including E741 (ambiguous single-letter names).
[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
extend-ignore = ["E702", "E731"]
